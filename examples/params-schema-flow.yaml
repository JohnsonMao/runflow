# 示範：頂層 params 宣告 + 模板替換
# 執行：flow run params-schema-flow.yaml --param who=World
# 或：  flow run params-schema-flow.yaml -f params.json
# 列出參數：flow params params-schema-flow.yaml
name: params-schema-flow
description: Flow with top-level params declaration and template substitution
params:
  - name: who
    type: string
    required: true
    description: Who to greet
  - name: count
    type: number
    default: 1
    description: Repeat count
steps:
  - id: greet
    type: set
    set: { greeting: "Hello {{ who }}" }
    dependsOn: []
  - id: out
    type: set
    set: { received: "{{ greet.greeting }}", count: "{{ count }}" }
    dependsOn: [greet]
