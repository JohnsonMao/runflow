# Parallel branches: b and c both depend on a.
# Run: flow run dag-parallel-flow.yaml
name: dag-parallel
description: Parallel branches after root
steps:
  - id: a
    type: set
    set: { root: true }
    dependsOn: []
  - id: b
    type: set
    set: { branch: "B" }
    dependsOn: [a]
  - id: c
    type: set
    set: { branch: "C" }
    dependsOn: [a]
