# 示範：HTTP 步驟、可配置 outputKey
# 執行：flow run http-flow.yaml
# 或帶參數：flow run http-flow.yaml --param path=json
name: http-flow
description: Flow with http step, optional outputKey
params:
  - name: path
    type: string
    default: json
steps:
  - id: fetch
    type: http
    url: https://httpbin.org/{{ path }}
    outputKey: api
    dependsOn: []
  - id: done
    type: set
    set: { status: "{{ api.statusCode }}" }
    dependsOn: [fetch]
