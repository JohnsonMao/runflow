# 示範：HTTP 步驟、可配置 output-key
# 執行：flow run http-flow.yaml
# 或帶參數：flow run http-flow.yaml --param path=json
name: http-flow
description: Flow with http step, optional output-key
params:
  - name: path
    type: string
    default: json
steps:
  - id: fetch
    type: http
    url: https://httpbin.org/{{ path }}
    output-key: api
    depends-on: []
  - id: echo
    type: command
    run: echo "Status {{ api.statusCode }}"
    depends-on: [fetch]
