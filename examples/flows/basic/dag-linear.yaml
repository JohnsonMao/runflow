# Linear DAG: dependency chain
# Run: node apps/cli/dist/cli.js run basic/dag-linear.yaml --config examples/config/runflow.config.json
name: dag-linear
description: Linear dependency chain; each step depends on the previous
steps:
  - id: a
    type: set
    set: { value: 1 }
    dependsOn: []
  - id: b
    type: set
    set: { value: 2 }
    dependsOn: [a]
  - id: c
    type: set
    set: { value: 3 }
    dependsOn: [b]
  - id: sum
    type: set
    set:
      total: "{{ a.value + b.value + c.value }}"
    dependsOn: [c]
