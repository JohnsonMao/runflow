# Call subflow (type: flow)
# Run: node apps/cli/dist/cli.js run basic/flow-call.yaml --config examples/config/runflow.config.json --param from=main
name: flow-call
description: Calls subflow basic/sub.yaml via flow step
params:
  - name: from
    type: string
    default: caller
steps:
  - id: callSub
    type: flow
    flow: basic/sub.yaml
    params:
      from: "{{ from }}"
    dependsOn: []
  - id: done
    type: set
    set:
      fromSub: "{{ callSub.fromSub }}"
      receivedFrom: "{{ callSub.receivedFrom }}"
    dependsOn: [callSub]
