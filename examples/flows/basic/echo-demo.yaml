# Custom step type (echo) example; uses handler from examples/config/runflow.config.json
# Run: node apps/cli/dist/cli.js run basic/echo-demo.yaml --config examples/config/runflow.config.json --verbose
name: echo-demo
description: Custom step type (echo) example
steps:
  - id: say
    type: echo
    message: Hello from custom handler
    dependsOn: []
  - id: done
    type: set
    set:
      echoed: "{{ say.echoed }}"
      message: "{{ say.message }}"
    dependsOn: [say]
