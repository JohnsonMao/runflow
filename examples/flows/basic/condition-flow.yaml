# Condition branch: then / else
# Run then: node apps/cli/dist/cli.js run basic/condition-flow.yaml --config examples/config/runflow.config.json --param branch=then
# Run else: node apps/cli/dist/cli.js run basic/condition-flow.yaml --config examples/config/runflow.config.json --param branch=else
name: condition-flow
description: Chooses then or else branch by param
params:
  - name: branch
    type: string
    default: else
    description: Branch (then / else)
steps:
  - id: cond
    type: condition
    when: params.branch === "then"
    then: [thenStep, summaryThen]
    else: [elseStep, summaryElse]
    dependsOn: []
  - id: thenStep
    type: set
    set: { branchResult: then }
    dependsOn: [cond]
  - id: elseStep
    type: set
    set: { branchResult: else }
    dependsOn: [cond]
  - id: summaryThen
    type: set
    set: { result: "{{ thenStep.branchResult }}" }
    dependsOn: [thenStep]
  - id: summaryElse
    type: set
    set: { result: "{{ elseStep.branchResult }}" }
    dependsOn: [elseStep]
