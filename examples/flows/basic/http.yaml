# HTTP step example
# Run: node apps/cli/dist/cli.js run basic/http.yaml --config examples/config/runflow.config.json --verbose
name: http-example
description: Calls an external API with the http step
steps:
  - id: fetch
    type: http
    url: https://httpbin.org/get
    method: GET
    outputKey: response
    dependsOn: []
  - id: done
    type: set
    set:
      statusCode: "{{ fetch.statusCode }}"
      url: "{{ fetch.body.url }}"
    dependsOn: [fetch]
