# Linear DAG: each step depends on the previous.
# Run: flow run dag-linear-flow.yaml
name: dag-linear
description: Linear chain with dependsOn
steps:
  - id: a
    type: set
    set: { step: "A" }
    depends-on: []
  - id: b
    type: set
    set: { step: "B" }
    depends-on: [a]
  - id: c
    type: set
    set: { step: "C" }
    depends-on: [b]
