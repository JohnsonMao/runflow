name: custom-echo-flow
description: Uses custom "echo" step type registered via runflow.config.mjs
steps:
  - id: one
    type: echo
    message: Hello from custom handler
    depends-on: []
  - id: two
    type: set
    set: { builtin: true }
    depends-on: [one]
  - id: three
    type: echo
    message: Done
    depends-on: [two]
