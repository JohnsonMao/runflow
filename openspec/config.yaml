schema: spec-driven

context: |
  Project: Runflow – YAML-defined reusable execution flows. Monorepo with pnpm + Turborepo.
  Tech stack: TypeScript, Vitest, ESLint (@antfu/eslint-config), pnpm catalogs.
  Packages: @runflow/core (flow engine: parse YAML, run steps), @runflow/cli (flow run <file.yaml>).
  Flow YAML: name, optional description, steps (id, type, run for type "command").
  Conventions: mao skill (types in types.ts, constants in constants.ts, describe/it, lint:fix).
  Future: MCP Server and GUI will reuse @runflow/core.

